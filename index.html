              const rowBg = i === 0 ? 'bg-yellow-50' : i === 1 ? 'bg-gray-50' : i === 2 ? 'bg-orange-50' : '';
              return (
                <tr key={u.id} className={`${rowBg} hover:bg-purple-50 transition-colors`}>
                  <td className="px-4 py-3 text-center">
                    <span className="text-lg">{medals[i] || `${i+1}º`}</span>
                  </td>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-2">
                      <div className="w-8 h-8 rounded-full bg-purple-100 text-purple-700 flex items-center justify-center text-xs font-bold">{u.avatar}</div>
                      <span className="font-medium text-gray-800">{u.nome}</span>
                    </div>
                  </td>
                  <td className="px-4 py-3 text-center">
                    <div className="flex flex-col items-center">
                      <span className="font-bold text-gray-700">{u.resolved}</span>
                      <div className="w-16 bg-gray-200 rounded-full h-1 mt-1"><div className="h-1 rounded-full bg-green-500" style={{width:`${u.m1}%`}}/></div>
                    </div>
                  </td>
                  <td className="px-4 py-3 text-center">
                    <span className={`font-semibold ${u.m2 >= 80?'text-green-600':u.m2>=60?'text-yellow-600':'text-red-600'}`}>{u.m2}%</span>
                  </td>
                  <td className="px-4 py-3 text-center">
                    <span className={`font-semibold ${u.m3 >= 70?'text-green-600':u.m3>=40?'text-yellow-600':'text-red-600'}`}>{u.m3}/100</span>
                  </td>
                  <td className="px-4 py-3 text-center">
                    <span className={`font-semibold ${u.late===0?'text-green-600':'text-red-600'}`}>
                      {u.late === 0 ? '✅ Zerado' : `⚠ ${u.late}`}
                    </span>
                  </td>
                  <td className="px-4 py-3 text-center">
                    <div className="inline-flex flex-col items-center">
                      <span className={`text-xl font-bold ${i===0?'text-yellow-600':i===1?'text-gray-500':i===2?'text-orange-600':'text-purple-600'}`}>
                        {u.score}
                      </span>
                      <span className="text-xs text-gray-400">pts</span>
                    </div>
                  </td>
                </tr>
              );
            })}
            {!ranking.length && <tr><td colSpan={7} className="text-center py-8 text-gray-400">Nenhum dado no período.</td></tr>}
          </tbody>
        </table>
      </div>

      <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-700">
        <strong>Como a pontuação é calculada:</strong> cada critério tem um peso configurável.
        Resolvidos (cada chamado = 10pts, cap 100) · SLA (% no prazo) · Velocidade (100 - média de dias × 5) · Zero Atrasos (100 - atrasados × 20).
        A pontuação final é a média ponderada pelos pesos definidos.
      </div>
    </div>
  );
}

// ── IMPORTAR LEADS ─────────────────────────────────────────────────────────

function ImportarPage({ tickets, onSave, unidades }) {
  const [step, setStep] = useState('upload'); // upload | mapping | preview | done
  const [rawHeaders, setRawHeaders] = useState([]);
  const [rawRows, setRawRows] = useState([]);
  const [mapping, setMapping] = useState({});
  const [preview, setPreview] = useState([]);
  const [importing, setImporting] = useState(false);
  const [importCount, setImportCount] = useState(0);
  const [filterDup, setFilterDup] = useState('all'); // all | dup | new
  const fileRef = useRef(null);

  const FIELDS = [
    // Dados do cliente
    { key:'nomeCliente',     label:'Nome do Cliente',       required:true, group:'cliente' },
    { key:'cpf',             label:'CPF',                                  group:'cliente' },
    { key:'email',           label:'E-mail',                               group:'cliente' },
    { key:'telefone',        label:'WhatsApp / Telefone',                  group:'cliente' },
    // Datas
    { key:'dataReclamacao',  label:'Data da Reclamação',                   group:'datas' },
    { key:'dataAtendimento', label:'Data do Atendimento',                  group:'datas' },
    // Atendimento
    { key:'unidade',         label:'Unidade',                              group:'atendimento' },
    { key:'tipoUnidade',     label:'Tipo (FR / PR)',                       group:'atendimento' },
    { key:'canal',           label:'Canal',                                group:'atendimento' },
    { key:'motivo',          label:'Motivo da Reclamação',                 group:'atendimento' },
    { key:'prioridade',      label:'Prioridade',                           group:'atendimento' },
    { key:'fase',            label:'Fase (Kanban)',                        group:'atendimento' },
    { key:'protocolo',       label:'Protocolo',                            group:'atendimento' },
    { key:'ticketBlip',      label:'Ticket BLIP',                          group:'atendimento' },
    { key:'sults',           label:'Sults',                                group:'atendimento' },
    { key:'idReclameAqui',   label:'ID Reclame Aqui',                      group:'atendimento' },
    { key:'numeroProcon',    label:'Nº Procon',                            group:'atendimento' },
    // Serviço e valores
    { key:'servico',         label:'Serviço Reclamado',                    group:'valores' },
    { key:'areaReclamada',   label:'Área Reclamada',                       group:'valores' },
    { key:'valorPago',       label:'Valor Pago',                           group:'valores' },
    { key:'reembolso',       label:'Reembolso Solicitado',                 group:'valores' },
    { key:'multaAplicada',   label:'Multa Aplicada',                       group:'valores' },
    // Extra
    { key:'observacoes',     label:'Observações',                          group:'extra' },
  ];

  const GROUP_LABELS = { cliente:'👤 Cliente', datas:'📅 Datas', atendimento:'📍 Atendimento', valores:'💰 Valores', extra:'📝 Extra' };

  const autoDetect = (hdrs) => {
    const map = {};
    const patterns = {
      nomeCliente:     /nome|client/i,
      cpf:             /cpf/i,
      email:           /e.?mail/i,
      telefone:        /tel|whats|fone|cel|phone/i,
      dataReclamacao:  /data.*reclam|data.*abertura|dt.*reclam|abertura/i,
      dataAtendimento: /data.*atend|dt.*atend/i,
      unidade:         /unidade|loja|store|franquia/i,
      tipoUnidade:     /tipo.*unidade|fr.pr|franquia.*propria/i,
      canal:           /canal|channel/i,
      motivo:          /motivo|reason|assunto/i,
      prioridade:      /prioridade|priority/i,
      fase:            /fase|stage|etapa/i,
      protocolo:       /protocolo|prot/i,
      ticketBlip:      /blip/i,
      sults:           /sults/i,
      idReclameAqui:   /reclame/i,
      numeroProcon:    /procon/i,
      servico:         /servi[cç]/i,
      areaReclamada:   /area|local/i,
      valorPago:       /valor.pago|valor\s|pago|price/i,
      reembolso:       /reembol/i,
      multaAplicada:   /multa/i,
      observacoes:     /obs|descri[cç]|nota|comment/i,
    };
    hdrs.forEach((h, i) => {
      const hs = String(h || '');
      for (const [field, pat] of Object.entries(patterns)) {
        if (!map[field] && pat.test(hs)) map[field] = String(i);
      }
    });
    setMapping(map);
  };

  const fmtDate = (v) => {
    if (!v) return '';
    // já é Date (cellDates:true)
    if (v instanceof Date) {
      const y = v.getFullYear(), m = String(v.getMonth()+1).padStart(2,'0'), d = String(v.getDate()).padStart(2,'0');
      return `${y}-${m}-${d}`;
    }
    // string dd/mm/yyyy ou yyyy-mm-dd
    const s = String(v).trim();
    const br = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (br) return `${br[3]}-${br[2].padStart(2,'0')}-${br[1].padStart(2,'0')}`;
    const iso = s.match(/^\d{4}-\d{2}-\d{2}/);
    if (iso) return iso[0];
    return s;
  };

  const parseFile = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type:'binary', cellDates:true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
        if (!json.length) return alert('Planilha vazia ou sem dados.');
        const hdrs = json[0].map(h => String(h||'').trim());
        const rows = json.slice(1).filter(r => r.some(v => String(v||'').trim()));
        setRawHeaders(hdrs);
        setRawRows(rows);
        autoDetect(hdrs);
        setStep('mapping');
      } catch(err) {
        alert('Erro ao ler arquivo. Certifique-se de usar .xlsx, .xls ou .csv');
      }
    };
    reader.readAsBinaryString(file);
  };

  const onDrop = (e) => {
    e.preventDefault();
    const file = e.dataTransfer?.files[0] || e.target.files?.[0];
    if (file) parseFile(file);
  };

  const buildPreview = () => {
    const processed = rawRows.map((row, idx) => {
      const get = (field) => {
        const col = mapping[field];
        if (col === undefined || col === '') return '';
        const v = row[parseInt(col)];
        return v !== null && v !== undefined ? String(v).trim() : '';
      };
      const getRaw = (field) => {
        const col = mapping[field];
        if (col === undefined || col === '') return '';
        return row[parseInt(col)];
      };

      const cpf = get('cpf').replace(/\D/g,'');
      const nome = get('nomeCliente').toLowerCase().trim();

      // Detecção de duplicatas — dentro da própria planilha (entre as linhas) E contra tickets existentes
      let dup = null, dupId = null, dupField = null;

      // contra tickets já salvos
      if (cpf.length >= 8) {
        const ex = tickets.find(t => t.cpf && t.cpf.replace(/\D/g,'') === cpf);
        if (ex) { dup = 'existing'; dupId = ex.id; dupField = 'CPF (já no sistema)'; }
      }
      if (!dup && nome.length > 3) {
        const ex = tickets.find(t => t.nomeCliente && t.nomeCliente.toLowerCase().trim() === nome);
        if (ex) { dup = 'existing'; dupId = ex.id; dupField = 'Nome (já no sistema)'; }
      }
      // duplicata dentro do próprio arquivo (verificado depois no buildPreview — marcado na segunda passagem)

      return {
        idx,
        data: {
          nomeCliente:     get('nomeCliente'),
          cpf:             get('cpf'),
          email:           get('email'),
          telefone:        get('telefone'),
          dataReclamacao:  fmtDate(getRaw('dataReclamacao')),
          dataAtendimento: fmtDate(getRaw('dataAtendimento')),
          unidade:         get('unidade'),
          tipoUnidade:     /^pr$/i.test(get('tipoUnidade').trim()) ? 'PR' : 'FR',
          canal:           get('canal'),
          motivo:          get('motivo'),
          prioridade:      (['baixa','media','alta','critica'].includes(get('prioridade').toLowerCase()) ? get('prioridade').toLowerCase() : 'media'),
          fase:            (FASES.includes(get('fase')) ? get('fase') : 'Novo'),
          protocolo:       get('protocolo'),
          ticketBlip:      get('ticketBlip'),
          sults:           get('sults'),
          idReclameAqui:   get('idReclameAqui'),
          numeroProcon:    get('numeroProcon'),
          servico:         get('servico'),
          areaReclamada:   get('areaReclamada'),
          valorPago:       get('valorPago'),
          reembolso:       get('reembolso'),
          multaAplicada:   get('multaAplicada') || 'Não',
          observacoes:     get('observacoes'),
        },
        dup, dupId, dupField,
        include: true, // TODOS marcados por padrão — usuário decide o que excluir
      };
    });

    // Segunda passagem: marcar duplicatas internas (mesma planilha)
    const seenCpf = {}, seenNome = {};
    processed.forEach(p => {
      if (p.dup) return; // já marcado como duplicata do sistema
      const cpf = p.data.cpf.replace(/\D/g,'');
      const nome = p.data.nomeCliente.toLowerCase().trim();
      if (cpf.length >= 8) {
        if (seenCpf[cpf] !== undefined) {
          p.dup = 'infile'; p.dupField = `CPF (linha ${seenCpf[cpf]+2})`;
        } else { seenCpf[cpf] = p.idx; }
      }
      if (!p.dup && nome.length > 3) {
        if (seenNome[nome] !== undefined) {
          p.dup = 'infile'; p.dupField = `Nome (linha ${seenNome[nome]+2})`;
        } else { seenNome[nome] = p.idx; }
      }
    });

    setPreview(processed);
    setStep('preview');
  };

  const toggleRow = (idx) => setPreview(p => p.map(r => r.idx === idx ? {...r, include: !r.include} : r));
  const toggleAll = (val) => setPreview(p => p.map(r => ({...r, include: val})));

  const doImport = () => {
    setImporting(true);
    const toImport = preview.filter(p => p.include);
    toImport.forEach(p => {
      const d = p.data;
      const today = new Date().toISOString().split('T')[0];
      const ticket = {
        id: genId(),
        dataReclamacao:  d.dataReclamacao  || today,
        dataAtendimento: d.dataAtendimento || today,
        ultimaAtualizacao: today,
        canal:      d.canal      || 'Importado',
        nomeCliente: d.nomeCliente,
        cpf:         d.cpf,
        email:       d.email,
        telefone:    d.telefone,
        unidade:     d.unidade,
        tipoUnidade: d.tipoUnidade,
        fase:        d.fase        || 'Novo',
        responsavel: '',
        motivo:      d.motivo      || 'Outros',
        prioridade:  d.prioridade  || 'media',
        protocolo:   d.protocolo,
        ticketBlip:  d.ticketBlip,
        sults:       d.sults,
        idReclameAqui:  d.idReclameAqui,
        numeroProcon:   d.numeroProcon,
        servico:        d.servico,
        areaReclamada:  d.areaReclamada,
        valorPago:      d.valorPago,
        reembolso:      d.reembolso,
        multaAplicada:  d.multaAplicada || 'Não',
        pagamentoRealizado: false,
        observacoes:    d.observacoes,
        status: ['Em andamento'],
        historico: [{ data: today, usuario: 'Importação', acao: 'Lead importado via planilha.' + (p.dup ? ` ⚠ Duplicata detectada (${p.dupField}).` : '') }],
      };
      onSave(ticket);
    });
    setImportCount(toImport.length);
    setImporting(false);
    setStep('done');
  };

  const reset = () => { setStep('upload'); setRawHeaders([]); setRawRows([]); setMapping({}); setPreview([]); setFilterDup('all'); };

  const dups = preview.filter(p => p.dup);
  const selected = preview.filter(p => p.include);
  const shown = filterDup === 'dup' ? preview.filter(p=>p.dup) : filterDup === 'new' ? preview.filter(p=>!p.dup) : preview;
  const groups = [...new Set(FIELDS.map(f=>f.group))];

  return (
    <div className="p-6 space-y-4 fade-in">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold text-gray-800">Importar Leads 📥</h2>
        {step !== 'upload' && step !== 'done' && (
          <button onClick={reset} className="text-xs text-gray-500 border border-gray-300 rounded-lg px-3 py-1.5 hover:bg-gray-50">← Novo arquivo</button>
        )}
      </div>

      {/* Steps indicator */}
      <div className="flex items-center gap-2 text-xs flex-wrap">
        {[['upload','1. Upload'],['mapping','2. Mapeamento'],['preview','3. Revisão'],['done','4. Concluído']].map(([s,l],i,arr)=>(
          <React.Fragment key={s}>
            <span className={`px-3 py-1 rounded-full font-medium ${step===s?'bg-purple-600 text-white':'text-gray-400'}`}>{l}</span>
            {i < arr.length-1 && <span className="text-gray-300">→</span>}
          </React.Fragment>
        ))}
      </div>

      {/* STEP 1: Upload */}
      {step === 'upload' && (
        <div
          onDrop={onDrop} onDragOver={e=>e.preventDefault()}
          onClick={()=>fileRef.current?.click()}
          className="border-2 border-dashed border-purple-300 rounded-2xl p-12 text-center cursor-pointer hover:border-purple-500 hover:bg-purple-50 transition-colors">
          <p className="text-5xl mb-4">📊</p>
          <p className="text-lg font-semibold text-gray-700">Arraste ou clique para selecionar</p>
          <p className="text-sm text-gray-400 mt-1">Suporta .xlsx, .xls e .csv — sem limite de linhas</p>
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={onDrop} />
        </div>
      )}

      {/* STEP 2: Mapping */}
      {step === 'mapping' && (
        <div className="space-y-4 fade-in">
          <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-700">
            Detectamos <strong>{rawHeaders.length}</strong> colunas e <strong>{rawRows.length}</strong> linhas.
            Confirme o mapeamento abaixo — campos detectados automaticamente estão pré-selecionados.
            Mapeie o máximo de campos possível para riqueza nos chamados.
          </div>

          {groups.map(g => {
            const gFields = FIELDS.filter(f=>f.group===g);
            return (
              <div key={g} className="bg-white rounded-xl border border-gray-200 p-4">
                <h4 className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">{GROUP_LABELS[g]}</h4>
                <div className="grid grid-cols-2 gap-3">
                  {gFields.map(f => (
                    <div key={f.key}>
                      <label className="text-xs font-medium text-gray-600 mb-1 block">
                        {f.label} {f.required && <span className="text-red-400">*</span>}
                        {mapping[f.key] !== undefined && mapping[f.key] !== '' && <span className="text-purple-500 ml-1">✓ auto</span>}
                      </label>
                      <select value={mapping[f.key] ?? ''} onChange={e=>setMapping(m=>({...m,[f.key]:e.target.value}))}
                        className="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-purple-400">
                        <option value="">— Não importar —</option>
                        {rawHeaders.map((h,i)=><option key={i} value={String(i)}>{h || `Coluna ${i+1}`}</option>)}
                      </select>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}

          <div className="bg-white rounded-xl border border-gray-200 p-3 overflow-x-auto">
            <p className="text-xs font-semibold text-gray-500 mb-2">Prévia (3 primeiras linhas da planilha):</p>
            <table className="text-xs">
              <thead><tr>{rawHeaders.map((h,i)=><th key={i} className="px-2 py-1 bg-gray-50 border text-left font-medium text-gray-600 whitespace-nowrap">{h||`Col ${i+1}`}</th>)}</tr></thead>
              <tbody>{rawRows.slice(0,3).map((r,i)=><tr key={i}>{rawHeaders.map((_,j)=><td key={j} className="px-2 py-1 border text-gray-700 whitespace-nowrap max-w-[180px] truncate">{String(r[j]??'')}</td>)}</tr>)}</tbody>
            </table>
          </div>
          <div className="flex justify-end">
            <button onClick={buildPreview} disabled={!mapping.nomeCliente && mapping.nomeCliente !== '0'}
              className="bg-purple-600 text-white text-sm px-6 py-2 rounded-lg hover:bg-purple-700 font-medium disabled:opacity-40">
              Verificar Duplicados ({rawRows.length} linhas) →
            </button>
          </div>
        </div>
      )}

      {/* STEP 3: Preview */}
      {step === 'preview' && (
        <div className="space-y-4 fade-in">
          <div className="grid grid-cols-4 gap-3">
            <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-center">
              <p className="text-2xl font-bold text-blue-700">{preview.length}</p>
              <p className="text-xs text-gray-500">Total na planilha</p>
            </div>
            <div className={`border rounded-xl p-3 text-center cursor-pointer ${filterDup==='dup'?'ring-2 ring-red-400':''} ${dups.length ? 'bg-red-50 border-red-200' : 'bg-green-50 border-green-200'}`}
              onClick={()=>setFilterDup(f=>f==='dup'?'all':'dup')}>
              <p className={`text-2xl font-bold ${dups.length ? 'text-red-600' : 'text-green-600'}`}>{dups.length}</p>
              <p className="text-xs text-gray-500">Duplicados {filterDup==='dup'&&'(filtrado)'}</p>
            </div>
            <div className={`bg-green-50 border border-green-200 rounded-xl p-3 text-center cursor-pointer ${filterDup==='new'?'ring-2 ring-green-400':''}`}
              onClick={()=>setFilterDup(f=>f==='new'?'all':'new')}>
              <p className="text-2xl font-bold text-green-700">{preview.length - dups.length}</p>
              <p className="text-xs text-gray-500">Novos {filterDup==='new'&&'(filtrado)'}</p>
            </div>
            <div className="bg-purple-50 border border-purple-200 rounded-xl p-3 text-center">
              <p className="text-2xl font-bold text-purple-700">{selected.length}</p>
              <p className="text-xs text-gray-500">Selecionados p/ importar</p>
            </div>
          </div>

          {dups.length > 0 && (
            <div className="bg-amber-50 border border-amber-300 rounded-xl p-3 text-xs text-amber-800 space-y-1">
              <p><strong>⚠ {dups.length} lead(s) com duplicidade detectada.</strong> Todos estão marcados — você decide quais desmarcar antes de importar.</p>
              <p>Clique no card "Duplicados" acima para filtrá-los. Ou use os checkboxes para desmarcar os que não deseja importar.</p>
              <div className="flex gap-2 pt-1">
                <button onClick={()=>setPreview(p=>p.map(r=>r.dup?{...r,include:false}:r))}
                  className="text-xs bg-red-100 text-red-700 px-3 py-1 rounded-lg hover:bg-red-200">
                  Desmarcar todos os duplicados
                </button>
                <button onClick={()=>toggleAll(true)}
                  className="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-lg hover:bg-green-200">
                  Marcar todos
                </button>
              </div>
            </div>
          )}

          <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
            <div className="overflow-x-auto max-h-[480px] overflow-y-auto">
              <table className="w-full text-xs">
                <thead className="sticky top-0 bg-gray-50 border-b z-10">
                  <tr>
                    <th className="px-3 py-2 text-left w-8">
                      <input type="checkbox" checked={shown.length > 0 && shown.every(r=>r.include)}
                        onChange={e=>setPreview(p=>p.map(r=>shown.find(s=>s.idx===r.idx)?{...r,include:e.target.checked}:r))} />
                    </th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500 whitespace-nowrap">Situação</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500 whitespace-nowrap">Nome</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500 whitespace-nowrap">CPF</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500 whitespace-nowrap">E-mail</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500 whitespace-nowrap">Telefone</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500 whitespace-nowrap">Data Reclamação</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500 whitespace-nowrap">Unidade</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500 whitespace-nowrap">Canal</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500 whitespace-nowrap">Motivo</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500 whitespace-nowrap">Serviço</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500 whitespace-nowrap">Valor Pago</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500 whitespace-nowrap">Observações</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {shown.map(p => (
                    <tr key={p.idx}
                      className={`${p.dup === 'existing' ? 'bg-red-50' : p.dup === 'infile' ? 'bg-amber-50' : ''} ${!p.include ? 'opacity-40' : ''}`}>
                      <td className="px-3 py-2">
                        <input type="checkbox" checked={p.include} onChange={()=>toggleRow(p.idx)} className="accent-purple-600" />
                      </td>
                      <td className="px-3 py-2 whitespace-nowrap">
                        {p.dup === 'existing'
                          ? <span className="inline-flex items-center gap-1 bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-medium">⚠ Duplicado — {p.dupField}</span>
                          : p.dup === 'infile'
                          ? <span className="inline-flex items-center gap-1 bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-medium">⚠ Repetido — {p.dupField}</span>
                          : <span className="bg-green-100 text-green-700 px-2 py-0.5 rounded-full">✓ Novo</span>}
                      </td>
                      <td className="px-3 py-2 font-medium text-gray-800 whitespace-nowrap max-w-[160px] truncate">{p.data.nomeCliente||'—'}</td>
                      <td className="px-3 py-2 text-gray-500 whitespace-nowrap">{p.data.cpf||'—'}</td>
                      <td className="px-3 py-2 text-gray-500 whitespace-nowrap max-w-[140px] truncate">{p.data.email||'—'}</td>
                      <td className="px-3 py-2 text-gray-500 whitespace-nowrap">{p.data.telefone||'—'}</td>
                      <td className="px-3 py-2 text-gray-500 whitespace-nowrap">{p.data.dataReclamacao||'—'}</td>
                      <td className="px-3 py-2 text-gray-500 max-w-[140px] truncate">{p.data.unidade||'—'}</td>
                      <td className="px-3 py-2 text-gray-500 whitespace-nowrap">{p.data.canal||'—'}</td>
                      <td className="px-3 py-2 text-gray-500 whitespace-nowrap max-w-[120px] truncate">{p.data.motivo||'—'}</td>
                      <td className="px-3 py-2 text-gray-500 whitespace-nowrap max-w-[120px] truncate">{p.data.servico||'—'}</td>
                      <td className="px-3 py-2 text-gray-500 whitespace-nowrap">{p.data.valorPago||'—'}</td>
                      <td className="px-3 py-2 text-gray-400 max-w-[160px] truncate">{p.data.observacoes||'—'}</td>
                    </tr>
                  ))}
                  {!shown.length && <tr><td colSpan={13} className="text-center py-6 text-gray-400">Nenhum item neste filtro.</td></tr>}
                </tbody>
              </table>
            </div>
          </div>

          <div className="flex justify-between items-center">
            <button onClick={()=>setStep('mapping')} className="text-sm text-gray-500 border border-gray-300 rounded-lg px-4 py-2 hover:bg-gray-50">← Voltar</button>
            <button onClick={doImport} disabled={!selected.length || importing}
              className="bg-purple-600 text-white text-sm px-6 py-2 rounded-lg hover:bg-purple-700 font-medium disabled:opacity-40">
              {importing ? 'Importando...' : `Importar ${selected.length} de ${preview.length} lead(s) →`}
            </button>
          </div>
        </div>
      )}

      {/* STEP 4: Done */}
      {step === 'done' && (
        <div className="fade-in text-center py-12 space-y-4">
          <div className="text-6xl">🎉</div>
          <h3 className="text-xl font-bold text-gray-800">{importCount} lead(s) importado(s) com sucesso!</h3>
          <p className="text-gray-500 text-sm">Os chamados foram criados com todos os dados disponíveis e estão na lista de chamados.</p>
          <div className="flex justify-center gap-3">
            <button onClick={reset} className="bg-purple-600 text-white text-sm px-6 py-2 rounded-lg hover:bg-purple-700 font-medium">
              Importar novo arquivo
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP ROOT ───────────────────────────────────────────────────────────────

function App() {
  const [user, setUser] = useState(null);
  const [view, setView] = useState('dashboard');
  const [tickets, setTickets] = useState(() => load('lco_tickets', TICKETS_DEFAULT));
  const [users, setUsers] = useState(() => load('lco_users', USERS_DEFAULT));
  const [motivos, setMotivos] = useState(() => load('lco_motivos', MOTIVOS_DEFAULT));
  const [unidades, setUnidades] = useState(() => load('lco_unidades', UNIDADES_DEFAULT));
  const [statusList, setStatusList] = useState(() => load('lco_status_list', STATUS_LIST_DEFAULT));

  useEffect(() => { save('lco_tickets', tickets); }, [tickets]);
  useEffect(() => { save('lco_users', users); }, [users]);
  useEffect(() => { save('lco_motivos', motivos); }, [motivos]);
  useEffect(() => { save('lco_unidades', unidades); }, [unidades]);
  useEffect(() => { save('lco_status_list', statusList); }, [statusList]);

  const saveTicket = t => setTickets(prev => {
    const i = prev.findIndex(x => x.id === t.id);
    return i >= 0 ? prev.map(x => x.id===t.id?t:x) : [...prev, t];
  });
  const delTicket = id => setTickets(prev => prev.filter(t => t.id !== id));
  const updateUsers = us => setUsers(us);

  if (!user) return <LoginPage users={users} onLogin={setUser} />;

  const pages = {
    dashboard:  <DashboardPage  tickets={tickets} users={users} />,
    tickets:    <TicketsPage    tickets={tickets} users={users} onSave={saveTicket} onDelete={delTicket} currentUser={user} motivos={motivos} unidades={unidades} statusList={statusList} />,
    kanban:     <KanbanPage     tickets={tickets} users={users} onSave={saveTicket} statusList={statusList} />,
    whatsapp:   <WhatsAppPage   users={users} onSave={saveTicket} currentUser={user} unidades={unidades} />,
    reports:    <ReportsPage    tickets={tickets} users={users} />,
    atendentes: <AtendentesPage tickets={tickets} users={users} />,
    premiacao:  <PremiacaoPage  tickets={tickets} users={users} />,
    importar:   <ImportarPage   tickets={tickets} onSave={saveTicket} unidades={unidades} />,
    settings: user.role==='admin'
      ? <SettingsPage users={users} onUpdateUsers={updateUsers} motivos={motivos} onUpdateMotivos={setMotivos} unidades={unidades} onUpdateUnidades={setUnidades} statusList={statusList} onUpdateStatusList={setStatusList} />
      : <div className="p-6 text-gray-400 text-center mt-20">Acesso restrito a administradores.</div>,
  };

  return (
    <div className="flex h-screen overflow-hidden bg-gray-50">
      <Sidebar view={view} setView={setView} user={user} onLogout={() => setUser(null)} />
      <main className="flex-1 overflow-auto">
        {pages[view] || pages.dashboard}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
