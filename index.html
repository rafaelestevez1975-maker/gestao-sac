// ── HELPERS ────────────────────────────────────────────────────────────────

function genId() {
  return 'T' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2,3).toUpperCase();
}

function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}

function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function daysSince(d) {
  if (!d) return 0;
  return Math.floor((new Date() - new Date(d + 'T00:00:00')) / 86400000);
}

// normaliza status para sempre ser array (compatibilidade com dados antigos)
function toStatusArr(s) {
  if (Array.isArray(s)) return s;
  return s ? [s] : ['Em andamento'];
}

function hasStatus(t, ...vals) {
  return toStatusArr(t.status).some(s => vals.includes(s));
}

function isOverdue(t) {
  if (hasStatus(t, 'Concluído','Resolvido','Encerrado / Sem Retorno')) return false;
  const sla = t.fase === 'Em pagamento' ? SLA_PAYMENT : SLA_NORMAL;
  return daysSince(t.ultimaAtualizacao) > sla;
}

function prioColor(k) {
  return PRIORIDADES.find(p => p.key === k)?.color || 'bg-gray-100 text-gray-600';
}

function prioLabel(k) {
  return PRIORIDADES.find(p => p.key === k)?.label || 'Média';
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR');
}

function calcScore(tickets, uid) {
  const mine = tickets.filter(t => t.responsavel === uid);
  if (!mine.length) return 100;
  let s = 100;
  mine.forEach(t => {
    if (hasStatus(t, 'Concluído','Resolvido')) s += 2;
    else if (isOverdue(t)) s -= (t.fase === 'Em pagamento' ? 10 : 5);
  });
  return Math.max(0, Math.min(100, s));
}

function Modal({ open, onClose, title, children, size = 'lg' }) {
  if (!open) return null;
  const w = { sm:'max-w-sm', md:'max-w-md', lg:'max-w-2xl', xl:'max-w-4xl', full:'max-w-6xl' }[size];
  return (
    <div className="fixed inset-0 z-50 bg-black/40 flex items-start justify-center p-4 overflow-auto">
      <div className={`bg-white rounded-2xl shadow-2xl w-full ${w} mt-8 fade-in`}>
        <div className="flex items-center justify-between px-5 py-4 border-b">
          <h3 className="font-semibold text-gray-800">{title}</h3>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">×</button>
        </div>
        <div className="px-5 py-4 max-h-[80vh] overflow-y-auto">{children}</div>
      </div>
    </div>
  );
}

    <div className="min-h-screen bg-gradient-to-br from-purple-900 via-purple-700 to-pink-600 flex items-center justify-center p-4">

          <p className="text-gray-400 text-sm mt-1">Sistema de Gestão de Atendimento</p>

              className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400" />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Senha</label>
            <div className="relative">
              <input type={show ? 'text' : 'password'} value={senha} onChange={e => setSenha(e.target.value)}
                placeholder="••••••••" required
                className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400" />
              <button type="button" onClick={() => setShow(!show)}
                className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs hover:text-gray-600">
                {show ? 'Ocultar' : 'Ver'}

// ── DASHBOARD ──────────────────────────────────────────────────────────────

function DashboardPage({ tickets, users }) {
  const r1 = useRef(null), r2 = useRef(null), r3 = useRef(null), r4 = useRef(null);

  const stats = useMemo(() => {
    const total = tickets.length;
    const abertos = tickets.filter(t => !hasStatus(t,'Concluído','Resolvido','Encerrado / Sem Retorno')).length;
    const concluidos = tickets.filter(t => hasStatus(t,'Concluído','Resolvido')).length;
    const atrasados = tickets.filter(t => isOverdue(t)).length;
    const criticos = tickets.filter(t => t.prioridade === 'critica' && !hasStatus(t,'Concluído','Resolvido')).length;
    return { total, abertos, concluidos, atrasados, criticos };
  }, [tickets]);

  useEffect(() => {
    const COLORS = ['#9333ea','#a855f7','#c084fc','#d8b4fe','#ec4899','#f472b6','#fb7185','#fdba74'];

    // Monthly
    const mc = {};
    tickets.forEach(t => { const k = t.dataReclamacao?.slice(0,7); if(k) mc[k] = (mc[k]||0)+1; });
    const months = Object.keys(mc).sort().slice(-6);
    const mn = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    if (r1.current) {
      if (r1.current._c) r1.current._c.destroy();
      r1.current._c = new Chart(r1.current.getContext('2d'), {
        type:'line',
        data:{ labels: months.map(m => mn[+m.split('-')[1]]+'/'+m.split('-')[0].slice(2)),
               datasets:[{ label:'Chamados', data:months.map(m=>mc[m]), borderColor:'#9333ea', backgroundColor:'rgba(147,51,234,0.08)', fill:true, tension:0.4, pointRadius:5, pointBackgroundColor:'#9333ea' }] },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,ticks:{stepSize:1}}} }
      });
    }

    // Motivos
    const motC = {};
    tickets.forEach(t => { if(t.motivo) motC[t.motivo] = (motC[t.motivo]||0)+1; });
    const topMot = Object.entries(motC).sort((a,b)=>b[1]-a[1]).slice(0,8);
    if (r2.current) {
      if (r2.current._c) r2.current._c.destroy();
      r2.current._c = new Chart(r2.current.getContext('2d'), {
        type:'doughnut',
        data:{ labels:topMot.map(([m])=>m), datasets:[{ data:topMot.map(([,c])=>c), backgroundColor:COLORS }] },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ font:{size:10}, boxWidth:12 } } } }
      });
    }

    // Unidades
    const uc = {};
    tickets.forEach(t => { if(t.unidade) uc[t.unidade] = (uc[t.unidade]||0)+1; });
    const topU = Object.entries(uc).sort((a,b)=>b[1]-a[1]).slice(0,8);
    if (r3.current) {
      if (r3.current._c) r3.current._c.destroy();
      r3.current._c = new Chart(r3.current.getContext('2d'), {
        type:'bar',
        data:{ labels:topU.map(([u])=>u.split(' - ').slice(-1)[0]),
               datasets:[{ label:'Chamados', data:topU.map(([,c])=>c), backgroundColor:'#9333ea', borderRadius:4 }] },
        options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y',
                  plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true}} }
      });
    }

    // Atendentes
    const atend = users.filter(u => u.role === 'atendente' && u.ativo);
    if (r4.current) {
      if (r4.current._c) r4.current._c.destroy();
      r4.current._c = new Chart(r4.current.getContext('2d'), {
        type:'bar',
        data:{
          labels: atend.map(u => u.nome),
          datasets:[
            { label:'Total',      data:atend.map(u => tickets.filter(t=>t.responsavel===u.id).length), backgroundColor:'#c084fc', borderRadius:4 },
            { label:'Concluídos', data:atend.map(u => tickets.filter(t=>t.responsavel===u.id&&hasStatus(t,'Concluído','Resolvido')).length), backgroundColor:'#7c3aed', borderRadius:4 },
          ]
        },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:12}}}, scales:{y:{beginAtZero:true}} }
      });
    }
  }, [tickets, users]);

  const overdueTix = tickets.filter(t => isOverdue(t));

  return (
    <div className="p-6 space-y-5 fade-in">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold text-gray-800">Dashboard</h2>
        <p className="text-xs text-gray-400">{new Date().toLocaleDateString('pt-BR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <KpiCard title="Total de Chamados" value={stats.total}    sub="Todos os registros" color="purple" icon="📋" />
        <KpiCard title="Em Andamento"       value={stats.abertos} sub="Aguardando resolução" color="blue"   icon="⏳" />
        <KpiCard title="Concluídos"         value={stats.concluidos} sub="Resolvidos"       color="green"  icon="✅" />
        <KpiCard title="Em Atraso"          value={stats.atrasados} sub={`${stats.criticos} críticos ativos`} color="red" icon="⚠️" />
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div className="bg-white rounded-xl border border-gray-200 p-4">
          <h3 className="text-sm font-semibold text-gray-700 mb-3">Chamados por Mês</h3>
          <div style={{height:180}}><canvas ref={r1}></canvas></div>
        </div>
        <div className="bg-white rounded-xl border border-gray-200 p-4">
          <h3 className="text-sm font-semibold text-gray-700 mb-3">Motivos</h3>
          <div style={{height:180}}><canvas ref={r2}></canvas></div>
        </div>
        <div className="bg-white rounded-xl border border-gray-200 p-4">
          <h3 className="text-sm font-semibold text-gray-700 mb-3">Top Unidades</h3>
          <div style={{height:210}}><canvas ref={r3}></canvas></div>
        </div>
        <div className="bg-white rounded-xl border border-gray-200 p-4">
          <h3 className="text-sm font-semibold text-gray-700 mb-3">Atendentes</h3>
          <div style={{height:210}}><canvas ref={r4}></canvas></div>
        </div>
      </div>

      {overdueTix.length > 0 && (
        <div className="bg-red-50 border border-red-200 rounded-xl p-4">
          <h3 className="text-sm font-semibold text-red-700 mb-3">⚠️ Chamados em Atraso ({overdueTix.length})</h3>
          <div className="space-y-2">
            {overdueTix.slice(0,5).map(t => (
              <div key={t.id} className="flex items-center justify-between text-sm bg-white rounded-lg p-2.5 border border-red-100">
                <span className="font-medium text-gray-700">{t.nomeCliente}</span>
                <span className="text-gray-400 text-xs">{t.unidade?.split(' - ').pop()}</span>
                <span className="text-red-600 font-medium text-xs">{daysSince(t.ultimaAtualizacao)} dias sem atualização</span>
              </div>
            ))}
            {overdueTix.length > 5 && <p className="text-xs text-red-500 text-center">+{overdueTix.length-5} outros em atraso</p>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── REPORTS ────────────────────────────────────────────────────────────────

function ReportsPage({ tickets, users }) {
  const r1 = useRef(null), r2 = useRef(null), r3 = useRef(null);
  const [period, setPeriod] = useState('30');

  const filtered = useMemo(() => {
    const days = parseInt(period);
    return tickets.filter(t => daysSince(t.dataReclamacao) <= days);
  }, [tickets, period]);

  useEffect(() => {
    // Status pie
    const sc = {};
    filtered.forEach(t => toStatusArr(t.status).forEach(s => sc[s] = (sc[s]||0)+1));
    const statuses = Object.entries(sc);
    const COLORS = ['#9333ea','#22c55e','#f59e0b','#ef4444','#3b82f6','#6b7280'];
    if (r1.current) {
      if (r1.current._c) r1.current._c.destroy();
      r1.current._c = new Chart(r1.current.getContext('2d'), {
        type:'pie',
        data:{ labels:statuses.map(([s])=>s), datasets:[{data:statuses.map(([,c])=>c), backgroundColor:COLORS}] },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:12}}} }
      });
    }

    // FR vs PR
    const fr = filtered.filter(t=>t.tipoUnidade==='FR').length;
    const pr = filtered.filter(t=>t.tipoUnidade==='PR').length;
    if (r2.current) {
      if (r2.current._c) r2.current._c.destroy();
      r2.current._c = new Chart(r2.current.getContext('2d'), {
        type:'doughnut',
        data:{ labels:['Franquia','Própria'], datasets:[{data:[fr,pr], backgroundColor:['#9333ea','#06b6d4']}] },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:{size:11}}}} }
      });
    }

    // Canal
    const cc = {};
    filtered.forEach(t => { if(t.canal) cc[t.canal] = (cc[t.canal]||0)+1; });
    const canais = Object.entries(cc).sort((a,b)=>b[1]-a[1]);
    if (r3.current) {
      if (r3.current._c) r3.current._c.destroy();
      r3.current._c = new Chart(r3.current.getContext('2d'), {
        type:'bar',
        data:{ labels:canais.map(([c])=>c), datasets:[{label:'Chamados',data:canais.map(([,n])=>n), backgroundColor:'#c084fc',borderRadius:4}] },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}} }
      });
    }
  }, [filtered]);

  const avgResolution = useMemo(() => {
    const resolved = filtered.filter(t => hasStatus(t,'Concluído','Resolvido'));
    if (!resolved.length) return 0;
    const days = resolved.map(t => {
      const a = new Date(t.dataReclamacao+'T00:00:00');
      const b = new Date(t.ultimaAtualizacao+'T00:00:00');
      return Math.max(0, (b-a)/86400000);
    });
    return (days.reduce((a,b)=>a+b,0)/days.length).toFixed(1);
  }, [filtered]);

  const slaOk = filtered.filter(t => !isOverdue(t) && hasStatus(t,'Concluído','Resolvido')).length;
  const slaTotal = filtered.filter(t => hasStatus(t,'Concluído','Resolvido')).length;

  return (
    <div className="p-6 space-y-5 fade-in">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold text-gray-800">Relatórios</h2>
        <select value={period} onChange={e=>setPeriod(e.target.value)}
          className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-purple-300">
          <option value="7">Últimos 7 dias</option>
          <option value="30">Últimos 30 dias</option>
          <option value="60">Últimos 60 dias</option>
          <option value="90">Últimos 90 dias</option>
          <option value="9999">Tudo</option>
        </select>
      </div>

      <div className="grid grid-cols-3 gap-4">
        <KpiCard title="Chamados no Período" value={filtered.length} color="purple" icon="📋" />
        <KpiCard title="Tempo Médio Resolução" value={`${avgResolution}d`} sub="dias" color="blue" icon="⏱" />
        <KpiCard title="Taxa SLA Cumprido" value={slaTotal ? `${Math.round(slaOk/slaTotal*100)}%` : '—'} sub="dos resolvidos no prazo" color="green" icon="🎯" />
      </div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div className="bg-white rounded-xl border border-gray-200 p-4">
          <h3 className="text-sm font-semibold text-gray-700 mb-3">Status dos Chamados</h3>
          <div style={{height:200}}><canvas ref={r1}></canvas></div>
        </div>
        <div className="bg-white rounded-xl border border-gray-200 p-4">
          <h3 className="text-sm font-semibold text-gray-700 mb-3">Franquia vs Própria</h3>
          <div style={{height:200}}><canvas ref={r2}></canvas></div>
        </div>
        <div className="bg-white rounded-xl border border-gray-200 p-4">
          <h3 className="text-sm font-semibold text-gray-700 mb-3">Canais de Entrada</h3>
          <div style={{height:200}}><canvas ref={r3}></canvas></div>
        </div>
      </div>
    </div>
  );
}

                const arr = toStatusArr(f.status);

      </div>
    </form>
  );
}

    if (!nota.trim()) return;
    const updated = { ...ticket, fase, status,
      ultimaAtualizacao: new Date().toISOString().split('T')[0],
      historico: [...(ticket.historico||[]), { data: new Date().toISOString().split('T')[0], usuario: currentUser.nome, acao: nota.trim() }]
    };
    onSave(updated);
    setNota('');
  };

  return (
    <div className="space-y-4">
      <div className="flex items-start justify-between gap-3">
        <div>
          <div className="flex items-center gap-2 flex-wrap">
            <h3 className="text-lg font-bold text-gray-800">{ticket.nomeCliente}</h3>
            {overdue && <span className="pulse text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-semibold">⚠ ATRASADO</span>}
          </div>
          <p className="text-sm text-gray-400">{ticket.id} · {ticket.unidade}</p>
        </div>
        <div className="flex gap-2 flex-wrap justify-end">
          <Badge label={prioLabel(ticket.prioridade)} color={prioColor(ticket.prioridade)} />
          <Badge label={ticket.tipoUnidade==='FR'?'Franquia':'Própria'} color={ticket.tipoUnidade==='FR'?'bg-blue-100 text-blue-700':'bg-green-100 text-green-700'} />
        </div>
      </div>

      <div className="grid grid-cols-3 gap-2">
        {[['Canal',ticket.canal],['Motivo',ticket.motivo],['Serviço',ticket.servico||'—'],
          ['E-mail',ticket.email||'—'],['WhatsApp',ticket.telefone||'—'],['CPF',ticket.cpf||'—'],
          ['Valor Pago',ticket.valorPago||'—'],['Reembolso',ticket.reembolso||'—'],['Atendente',atend?.nome||'—']
        ].map(([k,v]) => (
          <div key={k} className="bg-gray-50 rounded-lg p-2.5">
            <p className="text-xs text-gray-400 mb-0.5">{k}</p>
            <p className="text-sm font-medium text-gray-700 truncate">{v}</p>
          </div>
        ))}
      </div>

      {ticket.numeroProcon && <div className="bg-orange-50 border border-orange-200 rounded-lg p-3 text-sm"><span className="font-medium text-orange-700">Nº Procon:</span> <span className="text-orange-600">{ticket.numeroProcon}</span></div>}
      {ticket.idReclameAqui && <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-sm"><span className="font-medium text-blue-700">Reclame Aqui:</span> <span className="text-blue-600">{ticket.idReclameAqui}</span></div>}
      {ticket.observacoes && (
        <div className="bg-purple-50 border border-purple-100 rounded-lg p-3">
          <p className="text-xs font-medium text-purple-500 mb-1">Observações</p>
          <p className="text-sm text-purple-800">{ticket.observacoes}</p>
        </div>
      )}

      <div className="flex gap-3">
        <div className="flex-1">
          <label className="text-xs text-gray-500 mb-1 block">Fase</label>
          <select value={fase} onChange={e=>setFase(e.target.value)}
            className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-purple-400">
            {FASES.map(x=><option key={x}>{x}</option>)}
          </select>
        </div>
        <div className="flex-1">
          <label className="text-xs text-gray-500 mb-1 block">Status <span className="text-gray-400">(múltiplos)</span></label>
          <div className="border border-gray-300 rounded-lg p-2 space-y-1 bg-white">
            {STATUS_LIST.map(opt => {
              const checked = status.includes(opt);
              const toggle = () => {
                const next = checked ? status.filter(x=>x!==opt) : [...status, opt];
                setStatus(next.length ? next : ['Em andamento']);
              };
              return (
                <label key={opt} className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer hover:bg-purple-50 rounded px-1 py-0.5">
                  <input type="checkbox" checked={checked} onChange={toggle} className="accent-purple-600" />
                  {opt}
                </label>
              );
            })}
          </div>
        </div>
      </div>

      <div>
        <h4 className="text-sm font-semibold text-gray-700 mb-2">📝 Histórico</h4>
        <div className="space-y-2 max-h-48 overflow-y-auto mb-3 pr-1">
          {(ticket.historico||[]).length === 0 && <p className="text-xs text-gray-400">Sem histórico.</p>}
          {(ticket.historico||[]).map((h,i) => (
            <div key={i} className="flex gap-3 text-sm border-l-2 border-purple-100 pl-3 pb-2">
              <div>
                <p className="text-xs text-gray-400">{fmtDate(h.data)} · <span className="text-purple-500">{h.usuario}</span></p>
                <p className="text-gray-700">{h.acao}</p>
              </div>
            </div>
          ))}
        </div>
        <div className="flex gap-2">
          <textarea value={nota} onChange={e=>setNota(e.target.value)}
            placeholder="Adicionar atualização..."
            className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-purple-400"
            rows={2} />
          <button onClick={addNote} className="px-4 bg-purple-600 text-white rounded-lg text-sm font-medium hover:bg-purple-700 self-stretch">Salvar</button>
        </div>
      </div>
    </div>
  );
}

// ── TICKETS PAGE ───────────────────────────────────────────────────────────

function TicketsPage({ tickets, users, onSave, onDelete, currentUser, motivos }) {
  const [detail, setDetail] = useState(null);
  const [editing, setEditing] = useState(null);
  const [newT, setNewT] = useState(false);
  const [f, setF] = useState({ q:'', motivo:'', responsavel:'', status:'', tipo:'' });
  const [selected, setSelected] = useState(new Set());           // ids selecionados
  const [bulkStatus, setBulkStatus] = useState([]);
  const [bulkFase, setBulkFase] = useState('');
  const [bulkResp, setBulkResp] = useState('');
  const [bulkOpen, setBulkOpen] = useState(false);

  const atend = users.filter(u => u.role === 'atendente');
  const ff = k => v => setF(x => ({...x, [k]:v}));

  const list = useMemo(() => tickets.filter(t => {
    if (f.q && ![t.nomeCliente,t.cpf,t.email,t.id].join(' ').toLowerCase().includes(f.q.toLowerCase())) return false;
    if (f.motivo && t.motivo !== f.motivo) return false;
    if (f.responsavel && t.responsavel !== f.responsavel) return false;
    if (f.status && !toStatusArr(t.status).includes(f.status)) return false;
    if (f.tipo && t.tipoUnidade !== f.tipo) return false;
    return true;
  }), [tickets, f]);

  const reset = () => { setF({ q:'', motivo:'', responsavel:'', status:'', tipo:'' }); setSelected(new Set()); };

  // seleção
  const toggleOne = id => setSelected(s => { const n = new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const toggleAll = () => setSelected(s => s.size === list.length ? new Set() : new Set(list.map(t=>t.id)));

  // ação em lote
  const applyBulk = () => {
    if (!bulkStatus.length && !bulkFase && !bulkResp) return;
    list.filter(t => selected.has(t.id)).forEach(t => {
      const upd = { ...t, ultimaAtualizacao: new Date().toISOString().split('T')[0] };
      if (bulkStatus.length) upd.status = bulkStatus;
      if (bulkFase)   upd.fase   = bulkFase;
      if (bulkResp)   upd.responsavel = bulkResp;
      if (bulkStatus || bulkFase) {
        upd.historico = [...(t.historico||[]), {
          data: new Date().toISOString().split('T')[0],
          usuario: currentUser.nome,
          acao: `Atualização em lote — ${[bulkStatus.length&&`Status: ${bulkStatus.join(', ')}`, bulkFase&&`Fase: ${bulkFase}`, bulkResp&&`Responsável atualizado`].filter(Boolean).join(' · ')}`,
        }];
      }
      onSave(upd);
    });
    setSelected(new Set()); setBulkStatus([]); setBulkFase(''); setBulkResp(''); setBulkOpen(false);
  };

  if (newT) return (
    <div className="p-6 fade-in">
      <div className="flex items-center gap-3 mb-5">
        <button onClick={()=>setNewT(false)} className="text-gray-400 hover:text-gray-600 text-lg">←</button>
        <h2 className="text-xl font-bold text-gray-800">Novo Chamado</h2>
      </div>
      <TicketForm motivos={motivos} users={users} currentUser={currentUser}
        onSave={t=>{onSave(t);setNewT(false);}} onCancel={()=>setNewT(false)} />
    </div>
  );

  if (editing) return (
    <div className="p-6 fade-in">
      <div className="flex items-center gap-3 mb-5">
        <button onClick={()=>setEditing(null)} className="text-gray-400 hover:text-gray-600 text-lg">←</button>
        <h2 className="text-xl font-bold text-gray-800">Editar Chamado</h2>
      </div>
      <TicketForm motivos={motivos} ticket={editing} users={users} currentUser={currentUser}
        onSave={t=>{onSave(t);setEditing(null);}} onCancel={()=>setEditing(null)} />
    </div>
  );

  return (
    <div className="p-6 space-y-4 fade-in">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold text-gray-800">Chamados <span className="text-sm font-normal text-gray-400">({list.length})</span></h2>
        <button onClick={()=>setNewT(true)} className="bg-purple-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-purple-700 font-medium">+ Novo Chamado</button>
      </div>

      <div className="bg-white rounded-xl border border-gray-200 p-3 space-y-2">
        <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
          <input value={f.q} onChange={e=>setF(x=>({...x,q:e.target.value}))} placeholder="🔍 Buscar nome, CPF, ID..."
            className="col-span-2 border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300" />
          <select value={f.motivo} onChange={e=>ff('motivo')(e.target.value)}
            className="border border-gray-200 rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-purple-300">
            <option value="">Todos os motivos</option>
            {motivos.map(m=><option key={m}>{m}</option>)}
          </select>
          <select value={f.responsavel} onChange={e=>ff('responsavel')(e.target.value)}
            className="border border-gray-200 rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-purple-300">
            <option value="">Todas as atendentes</option>
            {atend.map(u=><option key={u.id} value={u.id}>{u.nome}</option>)}
          </select>
        </div>
        <div className="flex gap-2">
          <select value={f.status} onChange={e=>ff('status')(e.target.value)}
            className="flex-1 border border-gray-200 rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-purple-300">
            <option value="">Todos os status</option>
            {STATUS_LIST.map(s=><option key={s}>{s}</option>)}
          </select>
          <select value={f.tipo} onChange={e=>ff('tipo')(e.target.value)}
            className="flex-1 border border-gray-200 rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-purple-300">
            <option value="">FR + Própria</option>
            <option value="FR">Franquia</option>
            <option value="PR">Própria</option>
          </select>
          <button onClick={reset} className="text-xs text-gray-500 hover:text-gray-700 border border-gray-200 rounded-lg px-3 py-1.5">Limpar</button>
        </div>
      </div>

      {/* ── Barra de ação em lote ─────────────────────────────── */}
      {selected.size > 0 && (
        <div className="sticky top-0 z-20 bg-purple-700 text-white rounded-xl p-3 flex items-center gap-3 flex-wrap shadow-lg fade-in">
          <span className="text-sm font-semibold">{selected.size} selecionado(s)</span>
          <button onClick={()=>setBulkOpen(!bulkOpen)}
            className="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg font-medium">
            {bulkOpen ? '▲ Fechar' : '✏ Alterar selecionados'}
          </button>
          <button onClick={()=>setSelected(new Set())} className="text-xs text-purple-200 hover:text-white ml-auto">Desmarcar</button>

          {bulkOpen && (
            <div className="w-full flex flex-wrap gap-2 pt-2 border-t border-white/20">
              <div className="flex-1 min-w-[200px] bg-white/10 rounded-lg px-3 py-2">
                <p className="text-xs text-purple-200 mb-1.5">Status (marque os desejados)</p>
                <div className="flex flex-wrap gap-x-4 gap-y-1">
                  {STATUS_LIST.map(s => {
                    const checked = bulkStatus.includes(s);
                    const toggle = () => setBulkStatus(prev => checked ? prev.filter(x=>x!==s) : [...prev, s]);
                    return (
                      <label key={s} className="flex items-center gap-1.5 text-xs text-white cursor-pointer">
                        <input type="checkbox" checked={checked} onChange={toggle} className="accent-purple-300" />
                        {s}
                      </label>
                    );
                  })}
                </div>
              </div>
              <select value={bulkFase} onChange={e=>setBulkFase(e.target.value)}
                className="flex-1 min-w-[160px] border-0 rounded-lg px-3 py-1.5 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-white/50">
                <option value="">— Fase (Kanban) —</option>
                {FASES.map(s=><option key={s}>{s}</option>)}
              </select>
              <select value={bulkResp} onChange={e=>setBulkResp(e.target.value)}
                className="flex-1 min-w-[140px] border-0 rounded-lg px-3 py-1.5 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-white/50">
                <option value="">— Responsável —</option>
                {atend.map(u=><option key={u.id} value={u.id}>{u.nome}</option>)}
              </select>
              <button onClick={applyBulk}
                className="bg-white text-purple-700 font-semibold text-sm px-5 py-1.5 rounded-lg hover:bg-purple-50 transition-colors">
                Aplicar
              </button>
            </div>
          )}
        </div>
      )}

      <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-200">
              <tr>
                <th className="px-4 py-3 w-8">
                  <input type="checkbox"
                    checked={list.length > 0 && selected.size === list.length}
                    onChange={toggleAll}
                    className="accent-purple-600 cursor-pointer" />
                </th>
                {['ID','Cliente','Unidade','Motivo','Atendente','Fase','Status','Prioridade','Entrada','Ações'].map(h=>(
                  <th key={h} className="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {list.map(t => {
                const od = isOverdue(t);
                const at = users.find(u=>u.id===t.responsavel);
                const isSel = selected.has(t.id);
                const sc = { 'Em andamento':'bg-yellow-100 text-yellow-700', 'Resolvido':'bg-green-100 text-green-700',
                             'Concluído':'bg-green-100 text-green-700', 'Aguardando Reembolso':'bg-orange-100 text-orange-700',
                             'Respondido':'bg-blue-100 text-blue-700', 'Encerrado / Sem Retorno':'bg-gray-100 text-gray-600' };
                return (
                  <tr key={t.id} className={`transition-colors cursor-default
                    ${isSel ? 'bg-purple-50 border-l-4 border-l-purple-400' : od ? 'bg-red-50 hover:bg-red-100' : 'hover:bg-gray-50'}`}>
                    <td className="px-4 py-3" onClick={e=>e.stopPropagation()}>
                      <input type="checkbox" checked={isSel} onChange={()=>toggleOne(t.id)}
                        className="accent-purple-600 cursor-pointer" />
                    </td>
                    <td className="px-4 py-3 text-xs font-mono text-gray-400 whitespace-nowrap">{t.id}</td>
                    <td className="px-4 py-3 whitespace-nowrap" onClick={()=>setDetail(t)}>
                      <p className="font-medium text-gray-800 hover:text-purple-700 cursor-pointer">{t.nomeCliente}</p>
                      <p className="text-xs text-gray-400">{t.telefone}</p>
                    </td>
                    <td className="px-4 py-3">
                      <p className="text-xs text-gray-600 max-w-[130px] truncate">{t.unidade}</p>
                      <Badge label={t.tipoUnidade==='FR'?'FR':'PR'} color={t.tipoUnidade==='FR'?'bg-blue-50 text-blue-600':'bg-green-50 text-green-600'} />
                    </td>
                    <td className="px-4 py-3 text-xs text-gray-600 max-w-[100px] truncate">{t.motivo}</td>
                    <td className="px-4 py-3 text-xs text-gray-600 whitespace-nowrap">{at?.nome||'—'}</td>
                    <td className="px-4 py-3 text-xs text-gray-600 whitespace-nowrap">{t.fase}</td>
                    <td className="px-4 py-3"><div className="flex flex-wrap gap-1">{toStatusArr(t.status).map(st=><Badge key={st} label={st} color={sc[st]||'bg-gray-100 text-gray-600'} />)}</div></td>
                    <td className="px-4 py-3 whitespace-nowrap">
                      {od ? <span className="text-xs text-red-500 font-medium pulse">⚠ Atrasado</span>
                           : <Badge label={prioLabel(t.prioridade)} color={prioColor(t.prioridade)} />}
                    </td>
                    <td className="px-4 py-3 text-xs text-gray-400 whitespace-nowrap">{fmtDate(t.dataReclamacao)}</td>
                    <td className="px-4 py-3 whitespace-nowrap">
                      <div className="flex gap-1">
                        <button onClick={()=>setDetail(t)} className="text-xs px-2 py-1 bg-purple-50 text-purple-600 rounded hover:bg-purple-100 font-medium">👁 Ver</button>
                        <button onClick={()=>setEditing(t)} className="text-xs px-2.5 py-1 bg-blue-50 text-blue-600 rounded hover:bg-blue-100 font-medium">✏ Editar</button>
                        <button onClick={()=>{if(confirm('Excluir chamado?'))onDelete(t.id)}} className="text-xs px-2 py-1 bg-red-50 text-red-500 rounded hover:bg-red-100">🗑</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
              {!list.length && <tr><td colSpan={11} className="px-4 py-8 text-center text-gray-400">Nenhum chamado encontrado.</td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      <Modal open={!!detail} onClose={()=>setDetail(null)} title={`Chamado ${detail?.id}`} size="xl">
        {detail && <TicketDetail ticket={detail} users={users} currentUser={currentUser}
          onSave={t=>{onSave(t);setDetail(t);}} />}
      </Modal>
    </div>
  );
}

// ── KANBAN ─────────────────────────────────────────────────────────────────

function KanbanPage({ tickets, users, onSave }) {
  const [detail, setDetail] = useState(null);

  const colBorder = { 'Novo':'border-t-gray-400','Contato com cliente':'border-t-blue-400',
    'Contato com unidade':'border-t-cyan-500','Aguardando cliente':'border-t-yellow-400',
    'Aguardando retorno interno':'border-t-orange-400','Em pagamento':'border-t-pink-500','Concluído':'border-t-green-500' };

  const colCount = useMemo(() => {
    const c = {};
    FASES.forEach(f => c[f] = tickets.filter(t=>t.fase===f).length);
    return c;
  }, [tickets]);

  return (
    <div className="p-6 fade-in">
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-xl font-bold text-gray-800">Kanban</h2>
        <div className="flex gap-3 text-xs text-gray-500">
          <span>SLA: <strong className="text-gray-700">3 dias</strong> (geral)</span>
          <span>SLA: <strong className="text-pink-600">15 dias</strong> (pagamento)</span>
          <span className="text-red-500">⚠ = Atrasado</span>
        </div>
      </div>

      <div className="kanban-board">
        {FASES.map(col => {
          const colTix = tickets.filter(t=>t.fase===col);
          return (
            <div key={col} className={`kanban-col bg-white rounded-xl border border-gray-200 border-t-4 ${colBorder[col]} p-3 flex flex-col gap-2`}>
              <div className="flex items-center justify-between mb-1">
                <h3 className="text-xs font-semibold text-gray-500 uppercase tracking-wide leading-tight">{col}</h3>
                <span className="bg-gray-100 text-gray-600 text-xs rounded-full px-2 py-0.5">{colCount[col]}</span>
              </div>
              {colTix.map(t => {
                const od = isOverdue(t);
                const at = users.find(u=>u.id===t.responsavel);
                const ds = daysSince(t.ultimaAtualizacao);
                const sla = col === 'Em pagamento' ? SLA_PAYMENT : SLA_NORMAL;
                return (
                  <div key={t.id} onClick={()=>setDetail(t)}
                    className={`rounded-lg border p-3 cursor-pointer hover:shadow-md transition-shadow
                      ${od ? 'border-red-200 bg-red-50' : 'border-gray-100 bg-white'}`}>
                    <div className="flex justify-between items-start gap-1 mb-1">
                      <p className="text-xs font-semibold text-gray-800 leading-tight">{t.nomeCliente}</p>
                      {od && <span className="text-red-500 text-xs pulse flex-shrink-0">⚠</span>}
                    </div>
                    <p className="text-xs text-gray-400 truncate mb-1">{t.unidade?.split(' - ').pop()}</p>
                    <p className="text-xs text-purple-600 font-medium mb-2">{t.motivo}</p>
                    <div className="flex items-center justify-between">
                      <Badge label={prioLabel(t.prioridade)} color={prioColor(t.prioridade)} />
                      <span className="text-xs text-gray-400">{at?.nome?.split(' ')[0]||'—'}</span>
                    </div>
                    <div className={`text-xs mt-1.5 ${ds > sla ? 'text-red-500 font-medium' : 'text-gray-400'}`}>
                      ⏱ {ds}d sem atualização
                    </div>
                  </div>
                );
              })}
              {!colTix.length && (
                <div className="flex-1 min-h-20 flex items-center justify-center">
                  <p className="text-xs text-gray-300">Vazio</p>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <Modal open={!!detail} onClose={()=>setDetail(null)} title={`${detail?.id} — ${detail?.nomeCliente}`} size="xl">
        {detail && (
          <div className="space-y-4">
            <div>
              <p className="text-xs text-gray-500 font-medium mb-2">Mover para:</p>
              <div className="flex flex-wrap gap-2">
                {FASES.filter(f=>f!==detail.fase).map(f=>(
                  <button key={f} onClick={()=>{
                    const u={...detail,fase:f,ultimaAtualizacao:new Date().toISOString().split('T')[0]};
                    onSave(u);setDetail(u);
                  }} className="text-xs px-3 py-1 bg-gray-100 hover:bg-purple-100 hover:text-purple-700 rounded-full transition-colors">
                    {f}
                  </button>
                ))}
              </div>
            </div>
            <hr className="border-gray-100"/>
            <TicketDetail ticket={detail} users={users} currentUser={{nome:'Sistema'}}
              onSave={t=>{onSave(t);setDetail(t);}} />
          </div>
        )}
      </Modal>
    </div>
  );
}

// ── WHATSAPP INTAKE ────────────────────────────────────────────────────────

function WhatsAppPage({ users, onSave, currentUser }) {
  const steps = [
    { field:'nomeCliente', q:'Qual é o seu nome completo?',         hint:'Ex: Maria da Silva' },
    { field:'cpf',         q:'Qual é o seu CPF?',                    hint:'000.000.000-00' },
    { field:'email',       q:'Qual é o seu e-mail?',                 hint:'email@email.com' },
    { field:'telefone',    q:'Confirme o número do WhatsApp:',       hint:'(00) 00000-0000' },
    { field:'unidade',     q:'Em qual unidade foi atendido(a)?',     type:'unidade' },
    { field:'servico',     q:'Qual serviço você contratou?',         hint:'Ex: Depilação, Rejuvenescimento...' },
    { field:'valorPago',   q:'Qual foi o valor pago (aproximado)?', hint:'Ex: R$ 1.500,00' },
    { field:'motivo',      q:'Qual o motivo do seu contato?',       type:'motivo' },
    { field:'observacoes', q:'Descreva sua situação com detalhes:',  hint:'Quanto mais detalhes, melhor!' },
  ];

  const [step, setStep] = useState(0);
  const [form, setForm] = useState({});
  const [msgs, setMsgs] = useState([{ from:'bot', text:'Olá! Você chegou ao SAC da Laser&Co 💜 Vou precisar de algumas informações para registrar seu chamado. Qual é o seu nome completo?' }]);
  const [inp, setInp] = useState('');
  const [done, setDone] = useState(false);
  const [proto, setProto] = useState('');
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs]);

  const send = (val) => {
    const v = val || inp;
    if (!v && steps[step]?.type !== 'motivo') return;
    const nf = { ...form, [steps[step].field]: v };
    setForm(nf);
    const nm = [...msgs, { from:'user', text:v }];
    if (step + 1 < steps.length) {
      nm.push({ from:'bot', text: steps[step+1].q });
      setStep(step+1);
    } else {
      const p = genId();
      nm.push({ from:'bot', text:`✅ Obrigado pelas informações! Seu chamado foi registrado com sucesso.\n\nProtocolo: *${p}*\n\nEm breve nossa equipe entrará em contato pelo WhatsApp. 💜` });
      const ticket = {
        id:p, dataReclamacao:new Date().toISOString().split('T')[0],
        dataAtendimento:new Date().toISOString().split('T')[0],
        ultimaAtualizacao:new Date().toISOString().split('T')[0],
        canal:'WhatsApp', ...nf, fase:'Novo', responsavel:'', prioridade:'media',
        tipoUnidade:'FR', pagamentoRealizado:false, status:['Em andamento'],
        historico:[{data:new Date().toISOString().split('T')[0],usuario:'Bot WhatsApp',acao:'Chamado criado via triagem WhatsApp.'}]
      };
      onSave(ticket);
      setProto(p);
      setDone(true);
    }
    setMsgs(nm);
    setInp('');
  };

  const reset = () => { setStep(0);setForm({});setMsgs([{from:'bot',text:'Olá! Você chegou ao SAC da Laser&Co 💜 Vou precisar de algumas informações para registrar seu chamado. Qual é o seu nome completo?'}]);setInp('');setDone(false); };

  return (
    <div className="p-6 fade-in">
      <h2 className="text-xl font-bold text-gray-800 mb-1">Triagem via WhatsApp</h2>
      <p className="text-sm text-gray-400 mb-5">Simule a coleta de dados pelo WhatsApp. Ao concluir, o chamado é criado automaticamente.</p>

      <div className="max-w-md mx-auto shadow-xl rounded-2xl overflow-hidden border border-gray-200">
        <div className="bg-[#075e54] p-3 flex items-center gap-3">
          <div className="w-10 h-10 rounded-full bg-purple-400 flex items-center justify-center text-white font-bold text-sm">L&C</div>
          <div>
            <p className="text-white text-sm font-semibold">Gestão SAC</p>
            <p className="text-green-300 text-xs">Online agora</p>
          </div>
        </div>

        <div className="bg-[#ece5dd] p-4 space-y-2.5 min-h-72 max-h-96 overflow-y-auto">
          {msgs.map((m,i) => (
            <div key={i} className={`flex ${m.from==='user'?'justify-end':'justify-start'}`}>
              <div className={`max-w-xs rounded-2xl px-3.5 py-2 text-sm shadow-sm whitespace-pre-wrap
                ${m.from==='user' ? 'bg-[#dcf8c6] text-gray-800 rounded-br-sm' : 'bg-white text-gray-800 rounded-bl-sm'}`}>
                {m.text}
              </div>
            </div>
          ))}
          <div ref={endRef}/>
        </div>

        {!done && step < steps.length && (
          <div className="bg-[#f0f0f0] p-3 border-t border-gray-200">
            {steps[step]?.type === 'unidade' ? (
              <div className="flex gap-2">
                <select value={inp} onChange={e=>setInp(e.target.value)}
                  className="flex-1 border border-gray-300 rounded-full px-4 py-2 text-sm bg-white focus:outline-none">
                  <option value="">Selecione a unidade...</option>
                  {UNIDADES.map(u=><option key={u}>{u}</option>)}
                </select>
                <button onClick={()=>inp&&send(inp)}
                  className="bg-[#075e54] text-white rounded-full w-10 h-10 flex items-center justify-center text-lg hover:bg-green-800">▶</button>
              </div>
            ) : steps[step]?.type === 'motivo' ? (
              <div>
                <p className="text-xs text-gray-500 mb-2 text-center">Selecione o motivo:</p>
                <div className="grid grid-cols-2 gap-1.5">
                  {MOTIVOS_DEFAULT.slice(0,-1).map(m=>(
                    <button key={m} onClick={()=>send(m)}
                      className="text-left text-xs bg-white hover:bg-green-100 hover:text-green-800 rounded-lg px-2.5 py-1.5 border border-gray-200 transition-colors">
                      {m}
                    </button>
                  ))}
                </div>
              </div>
            ) : (
              <div className="flex gap-2">
                <input value={inp} onChange={e=>setInp(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&send()}
                  placeholder={steps[step]?.hint||'Digite...'}
                  className="flex-1 border border-gray-300 rounded-full px-4 py-2 text-sm focus:outline-none bg-white" />
                <button onClick={()=>send()}
                  className="bg-[#075e54] text-white rounded-full w-10 h-10 flex items-center justify-center text-lg hover:bg-green-800">▶</button>
              </div>
            )}
          </div>
        )}

        {done && (
          <div className="bg-white p-4 text-center border-t space-y-2">
            <p className="text-green-600 font-semibold text-sm">✅ Chamado #{proto} criado!</p>
            <button onClick={reset} className="text-xs bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg">Nova triagem</button>
          </div>
        )}
      </div>
    </div>
  );
}

function AtendentesPage({ tickets, users }) {
  const atend = users.filter(u => u.role === 'atendente' && u.ativo);

  const data = atend.map(u => {
    const mine = tickets.filter(t=>t.responsavel===u.id);
    const done = mine.filter(t=>hasStatus(t,'Concluído','Resolvido'));
    const open = mine.filter(t=>!hasStatus(t,'Concluído','Resolvido','Encerrado / Sem Retorno'));
    const late = mine.filter(t=>isOverdue(t));
    const score = calcScore(tickets, u.id);
    const avgD = done.length ? (done.map(t=>{
      const a=new Date(t.dataReclamacao+'T00:00:00'), b=new Date(t.ultimaAtualizacao+'T00:00:00');
      return Math.max(0,(b-a)/86400000);
    }).reduce((a,b)=>a+b,0)/done.length).toFixed(1) : '—';
    const taxa = mine.length ? Math.round(done.length/mine.length*100) : 0;
    return { ...u, mine, done, open, late, score, avgD, taxa };
  });

  const sc = s => s>=90?'text-green-600':s>=70?'text-yellow-600':s>=50?'text-orange-600':'text-red-600';
  const sb = s => s>=90?'bg-green-500':s>=70?'bg-yellow-500':s>=50?'bg-orange-500':'bg-red-500';

  return (
    <div className="p-6 space-y-4 fade-in">
      <h2 className="text-xl font-bold text-gray-800">Desempenho das Atendentes</h2>

      <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-700">
        <strong>Fórmula de pontuação:</strong> Base 100pts · +2pts por chamado concluído no prazo · -5pts por atraso (&gt;3 dias) · -10pts por pagamento em atraso (&gt;15 dias) · Mínimo: 0 · Máximo: 100+bônus
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {data.map(u => (
          <div key={u.id} className="bg-white rounded-xl border border-gray-200 p-4 space-y-3">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-11 h-11 rounded-full bg-purple-100 text-purple-700 flex items-center justify-center font-bold">{u.avatar}</div>
                <div>
                  <p className="font-semibold text-gray-800">{u.nome}</p>
                  <p className="text-xs text-gray-400">{u.email}</p>
                </div>
              </div>
              <div className="text-center bg-gray-50 rounded-xl px-3 py-2">
                <p className="text-xs text-gray-400">Nota</p>
                <p className={`text-2xl font-bold ${sc(u.score)}`}>{u.score}</p>
              </div>
            </div>

            <div className="grid grid-cols-4 gap-2 text-center">
              {[['Total',u.mine.length,'bg-gray-50 text-gray-700'],['Abertos',u.open.length,'bg-blue-50 text-blue-600'],
                ['Concluídos',u.done.length,'bg-green-50 text-green-600'],['Atrasados',u.late.length,'bg-red-50 text-red-600']].map(([l,v,c])=>(
                <div key={l} className={`${c} rounded-lg p-2`}>
                  <p className="text-xl font-bold">{v}</p>
                  <p className="text-xs text-gray-400">{l}</p>
                </div>
              ))}
            </div>

            <div className="flex justify-between text-sm text-gray-600">
              <span>Taxa resolução: <strong className="text-gray-800">{u.taxa}%</strong></span>
              <span>Tempo médio: <strong className="text-gray-800">{u.avgD} dias</strong></span>
            </div>

            <div className="w-full bg-gray-200 rounded-full h-2">
              <div className={`h-2 rounded-full transition-all ${sb(u.score)}`} style={{width:`${Math.min(100,u.score)}%`}} />
            </div>

            {u.late.length > 0 && (
              <div className="bg-red-50 border border-red-100 rounded-lg p-2.5">
                <p className="text-xs font-semibold text-red-600 mb-1">Em atraso:</p>
                {u.late.slice(0,3).map(t=>(
                  <p key={t.id} className="text-xs text-red-500">· {t.nomeCliente} — {daysSince(t.ultimaAtualizacao)}d sem atualização</p>
                ))}
                {u.late.length > 3 && <p className="text-xs text-red-400">+{u.late.length-3} outros</p>}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── PREMIAÇÃO ──────────────────────────────────────────────────────────────

function PremiacaoPage({ tickets, users }) {
  const [period, setPeriod] = useState('month');
  const [editCrit, setEditCrit] = useState(false);
  const [editPrizes, setEditPrizes] = useState(false);
  const [criteria, setCriteria] = useState(() => load('lco_criteria', {
    pesoResolvidos: 40, pesoSLA: 30, pesoTempo: 20, pesoSemAtraso: 10,
  }));
  const [prizes, setPrizes] = useState(() => load('lco_prizes', {
    p1: 'Vale presente R$ 200,00', p2: 'Vale presente R$ 100,00', p3: 'Reconhecimento especial',
  }));

  useEffect(() => { save('lco_criteria', criteria); }, [criteria]);
  useEffect(() => { save('lco_prizes', prizes); }, [prizes]);

  const ranking = useMemo(() => {
    const atend = users.filter(u => u.role === 'atendente' && u.ativo);
    const days = period === 'week' ? 7 : period === 'month' ? 30 : 9999;
    const pTix = tickets.filter(t => daysSince(t.dataReclamacao) <= days);

    const total = criteria.pesoResolvidos + criteria.pesoSLA + criteria.pesoTempo + criteria.pesoSemAtraso || 1;

    return atend.map(u => {
      const mine = pTix.filter(t => t.responsavel === u.id);
      const resolved = mine.filter(t => hasStatus(t,'Concluído','Resolvido'));
      const late = mine.filter(t => isOverdue(t));

      // M1: resolvidos (cada 1 vale 10 pontos, cap 100)
      const m1 = Math.min(100, resolved.length * 10);
      // M2: SLA compliance 0-100
      const m2 = resolved.length ? Math.round(resolved.filter(t => !isOverdue(t)).length / resolved.length * 100) : (mine.length ? 0 : 100);
      // M3: tempo médio (100 = 0 dias, -5 por dia médio)
      let m3 = 100;
      if (resolved.length) {
        const avg = resolved.map(t => Math.max(0,(new Date(t.ultimaAtualizacao+'T00:00:00')-new Date(t.dataReclamacao+'T00:00:00'))/86400000))
                            .reduce((a,b)=>a+b,0) / resolved.length;
        m3 = Math.max(0, Math.round(100 - avg * 5));
      }
      // M4: sem atraso — 100 se zerou, -20 por atrasado
      const m4 = mine.length ? Math.max(0, 100 - late.length * 20) : 100;

      const score = Math.round(
        (m1 * criteria.pesoResolvidos + m2 * criteria.pesoSLA + m3 * criteria.pesoTempo + m4 * criteria.pesoSemAtraso) / total
      );
      return { ...u, score, m1, m2, m3, m4, resolved: resolved.length, late: late.length, mine: mine.length };
    }).sort((a,b) => b.score - a.score);
  }, [tickets, users, period, criteria]);

  const medals = ['🥇','🥈','🥉'];
  const medalColors = ['from-yellow-400 to-yellow-600','from-gray-300 to-gray-500','from-orange-400 to-orange-600'];
  const podiumH = ['h-40','h-28','h-20'];
  const podiumOrder = ranking.length >= 3 ? [ranking[1], ranking[0], ranking[2]] : ranking;

  return (
    <div className="p-6 space-y-5 fade-in">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <h2 className="text-xl font-bold text-gray-800">Dashboard de Premiação 🏆</h2>
        <div className="flex gap-2">
          <select value={period} onChange={e=>setPeriod(e.target.value)}
            className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-purple-300">
            <option value="week">Semana atual</option>
            <option value="month">Mês atual</option>
            <option value="all">Geral</option>
          </select>
          <button onClick={()=>setEditCrit(!editCrit)} className="text-xs px-3 py-1.5 border border-purple-300 text-purple-600 rounded-lg hover:bg-purple-50">⚙ Critérios</button>
          <button onClick={()=>setEditPrizes(!editPrizes)} className="text-xs px-3 py-1.5 border border-yellow-400 text-yellow-600 rounded-lg hover:bg-yellow-50">🎁 Prêmios</button>
        </div>
      </div>

      {editCrit && (
        <div className="bg-purple-50 border border-purple-200 rounded-xl p-4 space-y-3 fade-in">
          <h4 className="text-sm font-semibold text-purple-800">Pesos dos Critérios (total = 100%)</h4>
          <p className="text-xs text-purple-600">Total atual: {criteria.pesoResolvidos+criteria.pesoSLA+criteria.pesoTempo+criteria.pesoSemAtraso}%</p>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            {[['Chamados Resolvidos','pesoResolvidos'],['Cumprimento SLA','pesoSLA'],['Velocidade (tempo)','pesoTempo'],['Zero Atrasos','pesoSemAtraso']].map(([l,k])=>(
              <div key={k}>
                <label className="text-xs text-gray-600 mb-1 block">{l}</label>
                <div className="flex items-center gap-2">
                  <input type="range" min="0" max="100" value={criteria[k]}
                    onChange={e=>setCriteria(c=>({...c,[k]:+e.target.value}))}
                    className="flex-1 accent-purple-600" />
                  <span className="text-sm font-bold text-purple-700 w-10 text-right">{criteria[k]}%</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {editPrizes && (
        <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-4 space-y-3 fade-in">
          <h4 className="text-sm font-semibold text-yellow-800">Descrição dos Prêmios</h4>
          {[['p1','🥇 1º Lugar'],['p2','🥈 2º Lugar'],['p3','🥉 3º Lugar']].map(([k,l])=>(
            <div key={k} className="flex items-center gap-3">
              <span className="text-sm font-medium text-gray-600 w-24">{l}</span>
              <input value={prizes[k]} onChange={e=>setPrizes(p=>({...p,[k]:e.target.value}))}
                className="flex-1 border border-yellow-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 bg-white" />
            </div>
          ))}
        </div>
      )}

      {/* Prêmios ativos */}
      <div className="grid grid-cols-3 gap-3">
        {[['p1','🥇','bg-yellow-50 border-yellow-300 text-yellow-800'],
          ['p2','🥈','bg-gray-50 border-gray-300 text-gray-700'],
          ['p3','🥉','bg-orange-50 border-orange-300 text-orange-800']].map(([k,m,c])=>(
          <div key={k} className={`border rounded-xl p-3 text-center ${c}`}>
            <p className="text-xl mb-1">{m}</p>
            <p className="text-xs font-semibold">{prizes[k]}</p>
          </div>
        ))}
      </div>

      {/* Pódio */}
      {ranking.length >= 2 && (
        <div className="bg-white rounded-xl border border-gray-200 p-6">
          <h3 className="text-sm font-semibold text-gray-600 text-center mb-6 uppercase tracking-wide">Pódio do Período</h3>
          <div className="flex items-end justify-center gap-4">
            {(ranking.length >= 3 ? [ranking[1], ranking[0], ranking[2]] : ranking.map((r,i)=>r)).map((u, idx) => {
              const realPos = ranking.length >= 3 ? [2,1,3][idx] - 1 : idx;
              const heights = ['h-28','h-40','h-20'];
              const hIdx = ranking.length >= 3 ? idx : idx;
              const bgGrad = ['from-gray-300 to-gray-400','from-yellow-400 to-yellow-500','from-orange-300 to-orange-500'][realPos] || 'from-gray-200 to-gray-300';
              return (
                <div key={u.id} className="flex flex-col items-center gap-2">
                  <div className="w-12 h-12 rounded-full bg-purple-100 text-purple-700 flex items-center justify-center font-bold text-lg shadow">
                    {u.avatar}
                  </div>
                  <p className="text-sm font-semibold text-gray-800">{u.nome}</p>
                  <p className="text-xs text-gray-400">{u.score} pts</p>
                  <div className={`w-24 bg-gradient-to-t ${bgGrad} rounded-t-xl flex items-start justify-center pt-2 ${heights[hIdx] || 'h-24'}`}>
                    <span className="text-2xl">{medals[realPos]}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Ranking completo */}
      <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div className="px-4 py-3 border-b border-gray-100 bg-gray-50">
          <h3 className="text-sm font-semibold text-gray-700">Ranking Completo</h3>
        </div>
        <table className="w-full text-sm">
          <thead>
            <tr className="border-b border-gray-100">
              <th className="text-left px-4 py-2.5 text-xs font-semibold text-gray-400 uppercase">#</th>
              <th className="text-left px-4 py-2.5 text-xs font-semibold text-gray-400 uppercase">Atendente</th>
              <th className="text-center px-4 py-2.5 text-xs font-semibold text-gray-400 uppercase">Resolvidos</th>
              <th className="text-center px-4 py-2.5 text-xs font-semibold text-gray-400 uppercase">SLA</th>
              <th className="text-center px-4 py-2.5 text-xs font-semibold text-gray-400 uppercase">Velocidade</th>
              <th className="text-center px-4 py-2.5 text-xs font-semibold text-gray-400 uppercase">Atrasos</th>
              <th className="text-center px-4 py-2.5 text-xs font-semibold text-gray-400 uppercase">Pontuação</th>
            </tr>
          </thead>
          <tbody className="divide-y divide-gray-50">
            {ranking.map((u, i) => {
              const isTop3 = i < 3;
              const rowBg = i === 0 ? 'bg-yellow-50' : i === 1 ? 'bg-gray-50' : i === 2 ? 'bg-orange-50' : '';
              return (
                <tr key={u.id} className={`${rowBg} hover:bg-purple-50 transition-colors`}>
                  <td className="px-4 py-3 text-center">
                    <span className="text-lg">{medals[i] || `${i+1}º`}</span>
                  </td>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-2">
                      <div className="w-8 h-8 rounded-full bg-purple-100 text-purple-700 flex items-center justify-center text-xs font-bold">{u.avatar}</div>
                      <span className="font-medium text-gray-800">{u.nome}</span>
                    </div>
                  </td>
                  <td className="px-4 py-3 text-center">
                    <div className="flex flex-col items-center">
                      <span className="font-bold text-gray-700">{u.resolved}</span>
                      <div className="w-16 bg-gray-200 rounded-full h-1 mt-1"><div className="h-1 rounded-full bg-green-500" style={{width:`${u.m1}%`}}/></div>
                    </div>
                  </td>
                  <td className="px-4 py-3 text-center">
                    <span className={`font-semibold ${u.m2 >= 80?'text-green-600':u.m2>=60?'text-yellow-600':'text-red-600'}`}>{u.m2}%</span>
                  </td>
                  <td className="px-4 py-3 text-center">
                    <span className={`font-semibold ${u.m3 >= 70?'text-green-600':u.m3>=40?'text-yellow-600':'text-red-600'}`}>{u.m3}/100</span>
                  </td>
                  <td className="px-4 py-3 text-center">
                    <span className={`font-semibold ${u.late===0?'text-green-600':'text-red-600'}`}>
                      {u.late === 0 ? '✅ Zerado' : `⚠ ${u.late}`}
                    </span>
                  </td>
                  <td className="px-4 py-3 text-center">
                    <div className="inline-flex flex-col items-center">
                      <span className={`text-xl font-bold ${i===0?'text-yellow-600':i===1?'text-gray-500':i===2?'text-orange-600':'text-purple-600'}`}>
                        {u.score}
                      </span>
                      <span className="text-xs text-gray-400">pts</span>
                    </div>
                  </td>
                </tr>
              );
            })}
            {!ranking.length && <tr><td colSpan={7} className="text-center py-8 text-gray-400">Nenhum dado no período.</td></tr>}
          </tbody>
        </table>
      </div>

      <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-700">
        <strong>Como a pontuação é calculada:</strong> cada critério tem um peso configurável.
        Resolvidos (cada chamado = 10pts, cap 100) · SLA (% no prazo) · Velocidade (100 - média de dias × 5) · Zero Atrasos (100 - atrasados × 20).
        A pontuação final é a média ponderada pelos pesos definidos.
      </div>
    </div>
  );
}

// ── IMPORTAR LEADS ─────────────────────────────────────────────────────────

function ImportarPage({ tickets, onSave }) {
  const [step, setStep] = useState('upload'); // upload | mapping | preview | done
  const [rawHeaders, setRawHeaders] = useState([]);
  const [rawRows, setRawRows] = useState([]);
  const [mapping, setMapping] = useState({});
  const [preview, setPreview] = useState([]);
  const [importing, setImporting] = useState(false);
  const [importCount, setImportCount] = useState(0);
  const fileRef = useRef(null);

  const FIELDS = [
    { key:'nomeCliente', label:'Nome do Cliente', required:true },
    { key:'cpf',         label:'CPF' },
    { key:'email',       label:'E-mail' },
    { key:'telefone',    label:'WhatsApp / Telefone' },
    { key:'unidade',     label:'Unidade' },
    { key:'canal',       label:'Canal' },
    { key:'motivo',      label:'Motivo' },
    { key:'servico',     label:'Serviço' },
    { key:'valorPago',   label:'Valor Pago' },
    { key:'dataReclamacao', label:'Data da Reclamação' },
    { key:'observacoes', label:'Observações' },
  ];

  const autoDetect = (hdrs) => {
    const map = {};
    const patterns = {
      nomeCliente: /nome|client/i, cpf: /cpf/i,
      email: /e.?mail/i, telefone: /tel|whats|fone|cel/i,
      unidade: /unidade|loja|store/i, canal: /canal/i,
      motivo: /motivo|reason/i, servico: /servi[cç]/i,
      valorPago: /valor|pago|price/i, dataReclamacao: /data|date/i,
      observacoes: /obs|descri|nota/i,
    };
    hdrs.forEach((h, i) => {
      for (const [field, pat] of Object.entries(patterns)) {
        if (!map[field] && pat.test(String(h || ''))) map[field] = String(i);
      }
    });
    setMapping(map);
  };

  const parseFile = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type:'binary', cellDates:true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
        if (!json.length) return alert('Planilha vazia ou sem dados.');
        const hdrs = json[0].map(h => String(h||'').trim());
        const rows = json.slice(1).filter(r => r.some(v => String(v||'').trim()));
        setRawHeaders(hdrs);
        setRawRows(rows);
        autoDetect(hdrs);
        setStep('mapping');
      } catch(err) {
        alert('Erro ao ler arquivo. Certifique-se de usar .xlsx, .xls ou .csv');
      }
    };
    reader.readAsBinaryString(file);
  };

  const onDrop = (e) => {
    e.preventDefault();
    const file = e.dataTransfer?.files[0] || e.target.files?.[0];
    if (file) parseFile(file);
  };

  const buildPreview = () => {
    const processed = rawRows.slice(0, 500).map((row, idx) => {
      const get = (field) => {
        const col = mapping[field];
        if (col === undefined || col === '') return '';
        const v = row[parseInt(col)];
        return v !== null && v !== undefined ? String(v).trim() : '';
      };

      const cpf = get('cpf').replace(/\D/g,'');
      const nome = get('nomeCliente').toLowerCase().trim();

      let dup = null, dupId = null, dupField = null;

      if (cpf.length >= 8) {
        const ex = tickets.find(t => t.cpf && t.cpf.replace(/\D/g,'') === cpf);
        if (ex) { dup = 'exact'; dupId = ex.id; dupField = 'CPF'; }
      }

      if (!dup && nome.length > 3) {
        const ex = tickets.find(t => t.nomeCliente && t.nomeCliente.toLowerCase().trim() === nome);
        if (ex) { dup = 'name'; dupId = ex.id; dupField = 'Nome'; }
      }

      return {
        idx, row,
        data: { nomeCliente: get('nomeCliente'), cpf: get('cpf'), email: get('email'),
                telefone: get('telefone'), unidade: get('unidade'), canal: get('canal'),
                motivo: get('motivo'), servico: get('servico'), valorPago: get('valorPago'),
                dataReclamacao: get('dataReclamacao'), observacoes: get('observacoes') },
        dup, dupId, dupField,
        include: !dup,
      };
    });
    setPreview(processed);
    setStep('preview');
  };

  const toggleRow = (idx) => {
    setPreview(p => p.map(r => r.idx === idx ? {...r, include: !r.include} : r));
  };

  const doImport = () => {
    setImporting(true);
    const toImport = preview.filter(p => p.include);
    toImport.forEach(p => {
      const d = p.data;
      const ticket = {
        id: genId(),
        dataReclamacao: d.dataReclamacao || new Date().toISOString().split('T')[0],
        dataAtendimento: new Date().toISOString().split('T')[0],
        ultimaAtualizacao: new Date().toISOString().split('T')[0],
        canal: d.canal || 'Importado',
        nomeCliente: d.nomeCliente, cpf: d.cpf, email: d.email, telefone: d.telefone,
        fase: 'Novo', responsavel: '',
        motivo: d.motivo || 'Outros', prioridade: 'media',
        unidade: d.unidade, tipoUnidade: 'FR',
        valorPago: d.valorPago, servico: d.servico,
        observacoes: d.observacoes, pagamentoRealizado: false, status: ['Em andamento'],
        historico: [{ data: new Date().toISOString().split('T')[0], usuario: 'Importação', acao: 'Lead importado via planilha.' }],
      };
      onSave(ticket);
    });
    setImportCount(toImport.length);
    setImporting(false);
    setStep('done');
  };

  const reset = () => { setStep('upload'); setRawHeaders([]); setRawRows([]); setMapping({}); setPreview([]); };

  const dups = preview.filter(p => p.dup);
  const selected = preview.filter(p => p.include);

  return (
    <div className="p-6 space-y-4 fade-in">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold text-gray-800">Importar Leads 📥</h2>
        {step !== 'upload' && step !== 'done' && (
          <button onClick={reset} className="text-xs text-gray-500 border border-gray-300 rounded-lg px-3 py-1.5 hover:bg-gray-50">← Novo arquivo</button>
        )}
      </div>

      {/* Steps indicator */}
      <div className="flex items-center gap-2 text-xs">
        {[['upload','1. Upload'],['mapping','2. Mapeamento'],['preview','3. Revisão'],['done','4. Concluído']].map(([s,l],i,arr)=>(
          <React.Fragment key={s}>
            <span className={`px-3 py-1 rounded-full font-medium ${step===s?'bg-purple-600 text-white':'text-gray-400'}`}>{l}</span>
            {i < arr.length-1 && <span className="text-gray-300">→</span>}
          </React.Fragment>
        ))}
      </div>

      {/* STEP 1: Upload */}
      {step === 'upload' && (
        <div
          onDrop={onDrop} onDragOver={e=>e.preventDefault()}
          onClick={()=>fileRef.current?.click()}
          className="border-2 border-dashed border-purple-300 rounded-2xl p-12 text-center cursor-pointer hover:border-purple-500 hover:bg-purple-50 transition-colors">
          <p className="text-5xl mb-4">📊</p>
          <p className="text-lg font-semibold text-gray-700">Arraste ou clique para selecionar</p>
          <p className="text-sm text-gray-400 mt-1">Suporta .xlsx, .xls e .csv</p>
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={onDrop} />
        </div>
      )}

      {/* STEP 2: Mapping */}
      {step === 'mapping' && (
        <div className="space-y-4 fade-in">
          <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-700">
            Detectamos <strong>{rawHeaders.length}</strong> colunas e <strong>{rawRows.length}</strong> linhas.
            Confirme o mapeamento abaixo — campos detectados automaticamente foram marcados.
          </div>
          <div className="bg-white rounded-xl border border-gray-200 p-4 grid grid-cols-2 gap-3">
            {FIELDS.map(f => (
              <div key={f.key}>
                <label className="text-xs font-medium text-gray-600 mb-1 block">
                  {f.label} {f.required && <span className="text-red-400">*</span>}
                </label>
                <select value={mapping[f.key] ?? ''} onChange={e=>setMapping(m=>({...m,[f.key]:e.target.value}))}
                  className="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-purple-400">
                  <option value="">— Não importar —</option>
                  {rawHeaders.map((h,i)=><option key={i} value={String(i)}>{h || `Coluna ${i+1}`}</option>)}
                </select>
              </div>
            ))}
          </div>
          <div className="bg-white rounded-xl border border-gray-200 p-3 overflow-x-auto">
            <p className="text-xs font-semibold text-gray-500 mb-2">Prévia (3 primeiras linhas):</p>
            <table className="text-xs">
              <thead><tr>{rawHeaders.map((h,i)=><th key={i} className="px-2 py-1 bg-gray-50 border text-left font-medium text-gray-600 whitespace-nowrap">{h||`Col ${i+1}`}</th>)}</tr></thead>
              <tbody>{rawRows.slice(0,3).map((r,i)=><tr key={i}>{r.map((v,j)=><td key={j} className="px-2 py-1 border text-gray-700 whitespace-nowrap max-w-xs truncate">{String(v)}</td>)}</tr>)}</tbody>
            </table>
          </div>
          <div className="flex justify-end">
            <button onClick={buildPreview} disabled={!mapping.nomeCliente && mapping.nomeCliente !== '0'}
              className="bg-purple-600 text-white text-sm px-6 py-2 rounded-lg hover:bg-purple-700 font-medium disabled:opacity-40">
              Verificar Duplicados →
            </button>
          </div>
        </div>
      )}

      {/* STEP 3: Preview */}
      {step === 'preview' && (
        <div className="space-y-4 fade-in">
          <div className="grid grid-cols-3 gap-3">
            <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-center">
              <p className="text-2xl font-bold text-blue-700">{preview.length}</p>
              <p className="text-xs text-gray-500">Leads encontrados</p>
            </div>
            <div className={`border rounded-xl p-3 text-center ${dups.length ? 'bg-red-50 border-red-200' : 'bg-green-50 border-green-200'}`}>
              <p className={`text-2xl font-bold ${dups.length ? 'text-red-600' : 'text-green-600'}`}>{dups.length}</p>
              <p className="text-xs text-gray-500">Duplicados detectados</p>
            </div>
            <div className="bg-green-50 border border-green-200 rounded-xl p-3 text-center">
              <p className="text-2xl font-bold text-green-700">{selected.length}</p>
              <p className="text-xs text-gray-500">Selecionados para importar</p>
            </div>
          </div>

          {dups.length > 0 && (
            <div className="bg-amber-50 border border-amber-300 rounded-xl p-3 text-xs text-amber-800">
              <strong>⚠ {dups.length} lead(s) duplicado(s) detectado(s)</strong> (desmarcados automaticamente).
              Leads marcados em vermelho já existem no sistema. Você pode reativá-los manualmente se necessário.
            </div>
          )}

          <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
            <div className="overflow-x-auto max-h-96 overflow-y-auto">
              <table className="w-full text-xs">
                <thead className="sticky top-0 bg-gray-50 border-b">
                  <tr>
                    <th className="px-3 py-2 text-left">
                      <input type="checkbox" checked={selected.length === preview.length}
                        onChange={e=>setPreview(p=>p.map(r=>({...r,include:e.target.checked})))} />
                    </th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500">Nome</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500">CPF</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500">E-mail / WhatsApp</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500">Unidade</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500">Motivo</th>
                    <th className="px-3 py-2 text-left font-semibold text-gray-500">Status</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {preview.map(p => (
                    <tr key={p.idx} className={p.dup ? 'bg-red-50' : p.include ? '' : 'opacity-50'}>
                      <td className="px-3 py-2">
                        <input type="checkbox" checked={p.include} onChange={()=>toggleRow(p.idx)} />
                      </td>
                      <td className="px-3 py-2 font-medium text-gray-800 whitespace-nowrap">{p.data.nomeCliente || '—'}</td>
                      <td className="px-3 py-2 text-gray-500 whitespace-nowrap">{p.data.cpf || '—'}</td>
                      <td className="px-3 py-2 text-gray-500 whitespace-nowrap">
                        <div>{p.data.email}</div>
                        <div className="text-gray-400">{p.data.telefone}</div>
                      </td>
                      <td className="px-3 py-2 text-gray-500 max-w-[140px] truncate">{p.data.unidade || '—'}</td>
                      <td className="px-3 py-2 text-gray-500 whitespace-nowrap">{p.data.motivo || '—'}</td>
                      <td className="px-3 py-2 whitespace-nowrap">
                        {p.dup
                          ? <span className="inline-flex items-center gap-1 text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-medium">
                              ⚠ Duplicado ({p.dupField})
                            </span>
                          : <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">✓ Novo</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          <div className="flex justify-between items-center">
            <button onClick={()=>setStep('mapping')} className="text-sm text-gray-500 border border-gray-300 rounded-lg px-4 py-2 hover:bg-gray-50">← Voltar</button>
            <button onClick={doImport} disabled={!selected.length || importing}
              className="bg-purple-600 text-white text-sm px-6 py-2 rounded-lg hover:bg-purple-700 font-medium disabled:opacity-40">
              {importing ? 'Importando...' : `Importar ${selected.length} lead(s) →`}
            </button>
          </div>
        </div>
      )}

      {/* STEP 4: Done */}
      {step === 'done' && (
        <div className="fade-in text-center py-12 space-y-4">
          <div className="text-6xl">🎉</div>
          <h3 className="text-xl font-bold text-gray-800">{importCount} lead(s) importado(s) com sucesso!</h3>
          <p className="text-gray-500 text-sm">Os chamados foram criados na fase "Novo" e estão disponíveis na lista de chamados.</p>
          <div className="flex justify-center gap-3">
            <button onClick={reset} className="bg-purple-600 text-white text-sm px-6 py-2 rounded-lg hover:bg-purple-700 font-medium">
              Importar novo arquivo
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [view, setView] = useState('dashboard');
  const [tickets, setTickets] = useState(() => load('lco_tickets', TICKETS_DEFAULT));
  const [users, setUsers] = useState(() => load('lco_users', USERS_DEFAULT));
  const [motivos, setMotivos] = useState(() => load('lco_motivos', MOTIVOS_DEFAULT));

  useEffect(() => { save('lco_tickets', tickets); }, [tickets]);
  useEffect(() => { save('lco_users', users); }, [users]);
  useEffect(() => { save('lco_motivos', motivos); }, [motivos]);

  const saveTicket = t => setTickets(prev => {
    const i = prev.findIndex(x => x.id === t.id);
    return i >= 0 ? prev.map(x => x.id===t.id?t:x) : [...prev, t];
  });
  const delTicket = id => setTickets(prev => prev.filter(t => t.id !== id));
  const updateUsers = us => setUsers(us);

  if (!user) return <LoginPage users={users} onLogin={setUser} />;

  const pages = {
    dashboard:  <DashboardPage  tickets={tickets} users={users} />,
    tickets:    <TicketsPage    tickets={tickets} users={users} onSave={saveTicket} onDelete={delTicket} currentUser={user} motivos={motivos} />,
    kanban:     <KanbanPage     tickets={tickets} users={users} onSave={saveTicket} />,
    whatsapp:   <WhatsAppPage   users={users} onSave={saveTicket} currentUser={user} />,
    reports:    <ReportsPage    tickets={tickets} users={users} />,
    atendentes: <AtendentesPage tickets={tickets} users={users} />,
    premiacao:  <PremiacaoPage  tickets={tickets} users={users} />,
    importar:   <ImportarPage   tickets={tickets} onSave={saveTicket} />,
    settings: user.role==='admin'
      ? <SettingsPage users={users} onUpdateUsers={updateUsers} motivos={motivos} onUpdateMotivos={setMotivos} />
      : <div className="p-6 text-gray-400 text-center mt-20">Acesso restrito a administradores.</div>,
  };

  return (
    <div className="flex h-screen overflow-hidden bg-gray-50">
      <Sidebar view={view} setView={setView} user={user} onLogout={() => setUser(null)} />
      <main className="flex-1 overflow-auto">
        {pages[view] || pages.dashboard}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
